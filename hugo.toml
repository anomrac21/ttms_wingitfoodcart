theme = '_menus_ttms'
languageCode = 'en-tt'
title = 'Wing it Food Cart'
baseURL = 'https://wingitfoodcart.ttmenus.com/'

# Mount theme's content (dashboard, locations, api, etc.); keep project content (defining mounts replaces default for that target)
[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "themes/_menus_ttms/content"
    target = "content"

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      attribute = true
    [markup.goldmark.renderer]
      unsafe = true

[outputFormats]
  [outputFormats.menuitemsJSON]
    mediaType = "application/json"
    baseName = "menu-items"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "JSON"]
  section = ["HTML", "JSON"]
  page = ["HTML", "JSON"]

[params]
  authServiceUrl = "https://auth.ttmenus.com"
  adsServiceUrl = "https://ads.ttmenus.com"
  notifyServiceUrl = "https://notify.ttmenus.com"

[params.ads]
  clientId = "ttms_wingitfoodcart"
  enabled = true
  apiUrl = "https://ads.ttmenus.com/api/v1"

[params.auth]
  enabled = true
  apiUrl = "https://auth.ttmenus.com/api/v1"

[params.contentManagement]
  enabled = true
  apiUrl = "https://cms.ttmenus.com/api"
  serviceUrl = "https://cms.ttmenus.com"
  clientId = "ttms_wingitfoodcart"

# Menu Image Service - user-submitted images with admin approval
[params.menuImageService]
  enabled = true
  apiUrl = "https://menu-images.ttmenus.com/api/v1"

# Notification Service Configuration
[params.notifications]
  enabled = true
  apiUrl = "https://notify.ttmenus.com/api/v1"
  websocketUrl = "wss://notify.ttmenus.com/api/v1/ws/connect"
  serviceUrl = "https://notify.ttmenus.com"

[params.features]
  payments = false
  delivery = false
  notifications = true

[params.orderingsystem]
  enabled = true
  orderingDisabledMessage = "Ordering is not available for this menu at this time."
  vat = 0
  servicecharge = 0
  hastables = true
  usephonecall = false
  whatsapp = 18683494647
  phone = 18683494647

[params.orderingmenu]
  sidesname = "Wings"

[params.posintegration]
  enabled = true
  api_url = "{{ env `POS_API_URL` }}"
  # POS configuration is now per-location in data/locations.yaml

[params.services]
  analyticsid = 7
  notifications = true

# Social profiles
[params.social]
  facebook = "https://www.facebook.com/WingitTT?mibextid=wwXIfr&rdid=8plMkLvvJGxO2bFD&share_url=https%3A%2F%2Fwww.facebook.com%2Fshare%2F15zk6rNP5R%2F%3Fmibextid%3DwwXIfr#"
  instagram = "https://www.instagram.com/wingit.tt/?igsh=MWtsZ3hmbWxheWxwMQ%3D%3D#"
  tiktok = "https://www.tiktok.com/@wingit.tt?_t=ZM-8uymQKOWMsQ&_r=1"
  youtube = ""
  email = ""
  phone = 18683494647

[privacy]
  [privacy.instagram]
    disable = false
    simple = false

[taxonomies]
  tag = "tags"
  category = "categories"
  subcategory = "subcategories"
  type = "types"
  event = "events"
  ingredient = "ingredients"
  cookingmethod = "cookingmethods"
